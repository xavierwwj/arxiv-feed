name: Daily arXiv Newsletter

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 09:00 SGT
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install arxiv anthropic requests

      - name: Run newsletter 
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ARXIV_CATEGORY: physics.atom-ph
          LOOKBACK_HOURS: "168"
          MAX_PAPERS: "15"
        run: python arxiv_newsletter.py

      - name: Commit paper cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers_today.json
          git diff --cached --quiet || git commit -m "Update papers_today.json [skip ci]"
          git push
